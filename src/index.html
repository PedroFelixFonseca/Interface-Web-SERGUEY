<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>eikon parcel starter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <lottie-player
      src="data.json"
      speed="1"
      class="lottie-player"
      loop
      autoplay
    ></lottie-player>

    <!-- animation scroll mains -->
    <div class="scroll-hint" id="scrollHint">
      <span>Scroll</span>
      <div class="scroll-arrow"></div>
    </div>

    <div class="grain"></div>

    <div class="sticky-container">
      <div class="scene" id="scene">
        <!-- Le visage complet (image originale) -->
        <div class="face-layer" id="faceLayer">
          <img src="img/hands-veil.png" alt="Portrait" />
        </div>

        <!-- Overlay sombre -->
        <div class="dark-overlay" id="darkOverlay"></div>

        <!-- Le voile (sera splitté en JS) -->
        <div class="veil-layer" id="veilLayer">
          <img src="img/hands-veil.png" alt="Veil" id="veilImg" />
        </div>

        <!-- Mains -->
        <div class="hands-layer">
          <div class="hand" id="handLeft">
            <img src="img/hands-veil.png" alt="main gauche" />
          </div>
          <div class="hand" id="handRight">
            <img src="img/hands-veil.png" alt="main droite" />
          </div>
        </div>

        <div class="reveal-text" id="revealText">Dévoilé</div>
      </div>
    </div>

    <script src="js/main.js" type="module"></script>
  </body>
</html>
