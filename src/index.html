<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>eikon parcel starter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div id="scene">
 
  <!-- INTRO -->
   <div id="intro">
    <div id="title-sayat">Sayat<br>Nova</div>
    <div id="byline">
      <span>A film by</span>
      <span class="director">Serguey Parajanov</span>
    </div>
  </div>
 
  <!-- POMEGRANATE PNG -->
  <div id="pomegranate-wrap">
    <img id="pomegranate" src="img/hands-head-background.png" alt="pomegranate" />
  </div>
 
  <!-- CTA -->
  <div id="cta">Click to start</div>
 
  <!-- REVEAL -->
  <div id="reveal">
    <div id="title-pomegranates">The Color of<br>Pomegranates</div>
  </div>
 
  </div>

<!-- lottie-player -->
    <lottie-player
      src="data.json"
      speed="1"
      class="lottie-player"
      loop
      autoplay
    ></lottie-player>

    <!-- animation scroll mains -->
    

    <script src="js/main.js" type="module"></script>
  </body>
</html>
